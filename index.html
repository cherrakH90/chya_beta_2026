<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChYA Beta 2026 | منصة الأستاذ شراك هواري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }

        /* تنسيق الزجاج - Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            margin: 20px auto;
            max-width: 1000px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 { color: #FFD700; font-size: 2.5em; margin-bottom: 10px; }
        h2 { color: #ffffff; font-size: 1.5em; opacity: 0.9; }

        /* حاوية الفيديو المباشر */
        .live-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
            margin-top: 20px;
        }

        .live-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-badge {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        footer { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.9em; }
    </style>
</head>
<body>

    <header>
        <div class="glass-panel" style="padding: 15px;">
            <h1>🦁 ChYA Beta 2026</h1>
            <h2>منصة الأستاذ شراك هواري - دروس خصوصية</h2>
        </div>
    </header>

    <main class="glass-panel">
        <div style="text-align: center;">
            <div class="status-badge">🔴 بث مباشر الآن</div>
            <h3 style="color: #FFD700;">📺 قناة دروس خصوصية - الجزائر</h3>
        </div>

        <div class="live-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/live_stream?channel=UC4p9U2yF_k215H8N87uD01A" 
                title="YouTube live player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <p style="text-align: center; margin-top: 25px; line-height: 1.8;">
            مرحباً بكم في المنصة التعليمية المتطورة. تابعوا الدروس المباشرة وتفاعلوا مع الأستاذ فوراً.
        </p>
    </main>

    <footer>
        &copy; 2026 جميع الحقوق محفوظة | تطوير: Cherrak Houari Lion d'or
    </footer>

</body>
</html>
